name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 1.0.2)'
        required: true
        type: string
      dry-run:
        description: 'Build and validate without deploying or pushing'
        required: false
        type: boolean
        default: false

env:
  VERSION: ${{ inputs.version }}

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: temurin
          server-id: central
          server-username: MAVEN_CENTRAL_USERNAME
          server-password: MAVEN_CENTRAL_PASSWORD
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-passphrase: GPG_PASSPHRASE

      - name: Cache Maven repository
        uses: actions/cache@v5
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-release-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-maven-release-

      - name: Validate preconditions
        run: |
          if ! echo "$VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Version '$VERSION' does not match semver pattern (e.g. 1.0.2)"
            exit 1
          fi

          UNRELEASED=$(sed -n '/^## \[Unreleased\]/,/^## \[/p' CHANGELOG.md | sed '1d;$d')
          if [ -z "$UNRELEASED" ]; then
            echo "::error::CHANGELOG.md has no content under [Unreleased]"
            exit 1
          fi

          if git tag -l "tabletest-reporter-$VERSION" | grep -q .; then
            echo "::error::Tag tabletest-reporter-$VERSION already exists"
            exit 1
          fi

          echo "All preconditions passed"

      - name: Set release version in Maven POMs
        run: mvn versions:set -DnewVersion="$VERSION" -DgenerateBackupPoms=false -q

      - name: Set release version in Gradle plugin
        run: sed -i "s|^version = \".*\"|version = \"$VERSION\"|" tabletest-reporter-gradle-plugin/build.gradle.kts

      - name: Stamp CHANGELOG.md
        run: |
          TODAY=$(date +%Y-%m-%d)
          sed -i "s|^## \[Unreleased\]|## [Unreleased]\n\n## [$VERSION] - $TODAY|" CHANGELOG.md

          # Update comparison link references
          PREV_TAG=$(grep '^\[Unreleased\]:' CHANGELOG.md | sed 's|.*/compare/||;s|\.\.\..*||')
          sed -i "s|\[Unreleased\]: .*/compare/.*|[Unreleased]: https://github.com/nchaugen/tabletest-reporter/compare/tabletest-reporter-$VERSION...HEAD|" CHANGELOG.md
          sed -i "/^\[Unreleased\]:/a [$VERSION]: https://github.com/nchaugen/tabletest-reporter/compare/$PREV_TAG...tabletest-reporter-$VERSION" CHANGELOG.md

      - name: Update version references
        run: |
          # README.md — coordinates banner
          sed -i "s|org\.tabletest:tabletest-reporter-\*:[0-9]\+\.[0-9]\+\.[0-9]\+|org.tabletest:tabletest-reporter-*:$VERSION|" README.md
          # README.md — Gradle plugin version
          sed -i "s|id(\"org.tabletest.reporter\") version \"[0-9]\+\.[0-9]\+\.[0-9]\+\"|id(\"org.tabletest.reporter\") version \"$VERSION\"|" README.md
          # README.md — Maven dependency versions
          sed -i '/<artifactId>tabletest-reporter-maven-plugin<\/artifactId>/{n;s|<version>[0-9]\+\.[0-9]\+\.[0-9]\+</version>|<version>'"$VERSION"'</version>|}' README.md
          sed -i '/<artifactId>tabletest-reporter-junit<\/artifactId>/{n;s|<version>[0-9]\+\.[0-9]\+\.[0-9]\+</version>|<version>'"$VERSION"'</version>|}' README.md
          # README.md — Gradle dependency version
          sed -i 's|org.tabletest:tabletest-reporter-junit:[0-9]\+\.[0-9]\+\.[0-9]\+|org.tabletest:tabletest-reporter-junit:'"$VERSION"'|' README.md

          # Compatibility test Maven poms
          find compatibility-tests -name 'pom.xml' -exec \
            sed -i "s|<version.tabletest-reporter>[^<]*</version.tabletest-reporter>|<version.tabletest-reporter>$VERSION</version.tabletest-reporter>|" {} +
          # Compatibility test Gradle files
          find compatibility-tests -name 'build.gradle.kts' -exec \
            sed -i "s|tabletest-reporter-gradle-plugin:[^\"]*\"|tabletest-reporter-gradle-plugin:$VERSION\"|" {} +

      - name: Commit release
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "release: prepare $VERSION"

      - name: Show release commit (dry-run)
        if: inputs.dry-run
        run: git show --stat HEAD && echo "---" && git show HEAD

      - name: Build and test Maven modules
        run: mvn clean install --no-transfer-progress

      - name: Build and test Gradle plugin
        run: |
          cd tabletest-reporter-gradle-plugin
          ./gradlew --console=plain clean build publishToMavenLocal

      - name: Run compatibility tests
        run: |
          cd compatibility-tests
          bash run-tests.sh

      - name: Deploy Maven modules to Central
        if: ${{ !inputs.dry-run }}
        run: mvn deploy -Prelease --no-transfer-progress -DskipTests
        env:
          MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}

      - name: Publish Gradle plugin to Portal
        if: ${{ !inputs.dry-run }}
        run: |
          cd tabletest-reporter-gradle-plugin
          ./gradlew --console=plain publishPlugins
        env:
          GRADLE_PUBLISH_KEY: ${{ secrets.GRADLE_PUBLISH_KEY }}
          GRADLE_PUBLISH_SECRET: ${{ secrets.GRADLE_PUBLISH_SECRET }}

      - name: Create git tag
        run: git tag "tabletest-reporter-$VERSION"

      - name: Set next SNAPSHOT version
        run: |
          NEXT_PATCH=$(echo "$VERSION" | awk -F. '{print $1"."$2"."$3+1}')
          NEXT_SNAPSHOT="${NEXT_PATCH}-SNAPSHOT"

          # Maven POMs
          mvn versions:set -DnewVersion="$NEXT_SNAPSHOT" -DgenerateBackupPoms=false -q

          # Gradle plugin
          sed -i "s|^version = \".*\"|version = \"$NEXT_SNAPSHOT\"|" tabletest-reporter-gradle-plugin/build.gradle.kts

          # Compatibility test Maven poms
          find compatibility-tests -name 'pom.xml' -exec \
            sed -i "s|<version.tabletest-reporter>[^<]*</version.tabletest-reporter>|<version.tabletest-reporter>$NEXT_SNAPSHOT</version.tabletest-reporter>|" {} +
          # Compatibility test Gradle files
          find compatibility-tests -name 'build.gradle.kts' -exec \
            sed -i "s|tabletest-reporter-gradle-plugin:[^\"]*\"|tabletest-reporter-gradle-plugin:$NEXT_SNAPSHOT\"|" {} +

      - name: Commit next development version
        run: |
          NEXT_PATCH=$(echo "$VERSION" | awk -F. '{print $1"."$2"."$3+1}')
          NEXT_SNAPSHOT="${NEXT_PATCH}-SNAPSHOT"
          git add -A
          git commit -m "chore: set next development version $NEXT_SNAPSHOT"

      - name: Show snapshot commit (dry-run)
        if: inputs.dry-run
        run: git show --stat HEAD && echo "---" && git show HEAD

      - name: Push commits and tags
        if: ${{ !inputs.dry-run }}
        run: git push origin main "tabletest-reporter-$VERSION"

      - name: Create GitHub release
        if: ${{ !inputs.dry-run }}
        run: |
          BODY=$(sed -n "/^## \[$VERSION\]/,/^## \[/{/^## \[/!p}" CHANGELOG.md)
          gh release create "tabletest-reporter-$VERSION" \
            --title "TableTest Reporter $VERSION" \
            --notes "$BODY" \
            tabletest-reporter-cli/target/tabletest-reporter-cli-$VERSION.jar
        env:
          GH_TOKEN: ${{ github.token }}
